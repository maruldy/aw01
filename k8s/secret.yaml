# .env 값들을 base64 인코딩하여 채워넣으세요
# echo -n "값" | base64
apiVersion: v1
kind: Secret
metadata:
  name: work-harness-env
  labels:
    app: work-harness
type: Opaque
data:
  APP_ENV: cHJvZHVjdGlvbg==  # production
  ADMIN_TOKEN: ""              # echo -n "your-token" | base64
  OPENAI_API_KEY: ""
  OPENAI_API_BASE: ""
  OPENAI_MODEL: ""
  GITHUB_BASE_URL: ""
  GITHUB_TOKEN: ""
  GITHUB_REPOSITORY: ""
  GITHUB_WEBHOOK_SECRET: ""
  WEBHOOK_BASE_URL: ""         # 외부 접근 가능한 URL (예: https://harness.your-company.com)
