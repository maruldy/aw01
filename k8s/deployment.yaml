apiVersion: apps/v1
kind: Deployment
metadata:
  name: work-harness
  labels:
    app: work-harness
spec:
  replicas: 1
  selector:
    matchLabels:
      app: work-harness
  template:
    metadata:
      labels:
        app: work-harness
    spec:
      containers:
        - name: harness
          image: work-harness:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: work-harness-env
          volumeMounts:
            - name: data
              mountPath: /app/data
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: work-harness-data
