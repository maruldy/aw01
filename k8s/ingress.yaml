apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: work-harness
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  rules:
    - host: harness.your-company.com  # 실제 도메인으로 변경
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: work-harness
                port:
                  number: 80
